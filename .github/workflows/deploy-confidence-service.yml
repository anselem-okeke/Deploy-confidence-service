name: Deploy Deploy-Confidence Service

on:
  push:
    branches:
      - dev   #should be main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/anselem-okeke/deploy-confidence-service
  NAMESPACE: deploy-confidence
  DEPLOYMENT_NAME: deploy-confidence-service
  CONTAINER_NAME: deploy-confidence-service

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: |
          pytest -q

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t $IMAGE_NAME:${GITHUB_SHA} \
            -t $IMAGE_NAME:latest \
            .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:${GITHUB_SHA}
          docker push $IMAGE_NAME:latest

   deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update deployment image
        run: |
          kubectl -n $NAMESPACE set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=$IMAGE_NAME:${{ needs.build-and-push.outputs.image_tag }}

      - name: Wait for rollout
        run: |
          kubectl -n $NAMESPACE rollout status deployment/$DEPLOYMENT_NAME --timeout=180s

      - name: Check pod status
        run: |
          kubectl get pods -n $NAMESPACE -o wide

      - name: Port-forward service
        run: |
          kubectl -n $NAMESPACE port-forward svc/$DEPLOYMENT_NAME 18000:8000 >/tmp/port-forward.log 2>&1 &
          sleep 10

      - name: Verify /live
        run: |
          curl --fail http://127.0.0.1:18000/live

      - name: Verify /ready
        run: |
          curl --fail http://127.0.0.1:18000/ready

      - name: Verify /health
        run: |
          curl --fail http://127.0.0.1:18000/health