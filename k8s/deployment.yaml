apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-confidence-service
  namespace: deploy-confidence
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deploy-confidence-service
  template:
    metadata:
      labels:
        app: deploy-confidence-service
    spec:
      serviceAccountName: deploy-confidence-sa
      containers:
        - name: deploy-confidence-service
          image: ghcr.io/anselem-okeke/deploy-confidence-service:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: deploy-confidence-config
            - secretRef:
                name: deploy-confidence-secret
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "10m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"




